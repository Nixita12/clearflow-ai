# ─── Offence Code Mapping (from dataset offence_code column) ─────────────────
offence_codes:
  112: WRONG_PARKING
  113: NO_PARKING
  107: PARKING_MAIN_ROAD
  116: DEFECTIVE_NUMBER_PLATE
  105: PARKING_ON_FOOTPATH
  111: PARKING_NEAR_BUSSTOP_SCHOOL_HOSPITAL
  109: DOUBLE_PARKING
  104: PARKING_NEAR_ROAD_CROSSING
  124: OTHER

# ─── Congestion Impact Score Weights ─────────────────────────────────────────
# Score = (delta_throughput*w1) + (delta_speed*w2) + (zone_weight*w3) + (time_weight*w4)
impact_score:
  w_throughput: 0.40
  w_speed: 0.30
  w_zone: 0.20
  w_time: 0.10
  critical_threshold: 75
  high_threshold: 50
  medium_threshold: 25

# ─── Time-of-Day Weights (derived from dataset hourly distribution) ───────────
# Hour → normalised violation density (peak = 5 AM = 1.0)
time_of_day_weights:
  0: 0.64
  1: 0.50
  2: 0.73
  3: 0.75
  4: 0.85
  5: 1.00
  6: 0.79
  7: 0.43
  8: 0.25
  9: 0.09
  10: 0.02
  11: 0.02
  12: 0.01
  13: 0.00
  14: 0.00
  15: 0.00
  16: 0.01
  17: 0.02
  18: 0.06
  19: 0.31
  20: 0.35
  21: 0.58
  22: 0.67
  23: 0.67

# ─── Output / Alerting ────────────────────────────────────────────────────────
output:
  json_stream: output/violations/stream.jsonl
  reports_dir: output/reports/
  alert_webhook: ""             # POST endpoint for real-time alerts
  data_sent_to_scita: true      # mirrors dataset field

# ─── Baseline Traffic (for Congestion Index calc) ────────────────────────────
# Measured during clean periods (no active violations in zone)
baseline:
  throughput_vehicles_per_min: 12.0   # q_baseline
  speed_kmh: 28.0                     # v_baseline
  rolling_window_frames: 300          # frames used to compute rolling baseline
