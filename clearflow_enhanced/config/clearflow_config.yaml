# ClearFlow AI — Master Configuration
# All values derived from jan_to_may_police_violation dataset (298,450 records)

project:
  name: ClearFlow AI
  version: "1.0"
  city: Bengaluru
  dataset: jan_to_may_police_violation_anonymized

# ─── YOLO Model ───────────────────────────────────────────────────────────────
model:
  weights: yolov8n.pt          # swap to yolov8s.pt for better accuracy on demo
  confidence_threshold: 0.45
  iou_threshold: 0.50
  input_size: 640
  device: cpu                  # change to "0" for GPU
  inference_target_ms: 30      # alert if exceeded

  # Vehicle classes from dataset — mapped to COCO/custom YOLO class IDs
  # Dataset vehicle_type values: SCOOTER, CAR, MOTOR CYCLE, PASSENGER AUTO,
  #   MAXI-CAB, LGV, GOODS AUTO, MOPED, PRIVATE BUS, VAN, TEMPO, HGV, etc.
  vehicle_classes:
    CAR:              [2]          # COCO class 2 = car
    MOTOR_CYCLE:      [3]          # COCO class 3 = motorcycle
    SCOOTER:          [3]          # grouped with motorcycle in COCO
    MOPED:            [3]
    BUS:              [5]          # COCO class 5 = bus
    PRIVATE_BUS:      [5]
    MAXI_CAB:         [5]
    TRUCK:            [7]          # COCO class 7 = truck
    LGV:              [7]
    HGV:              [7]
    LORRY:            [7]
    PASSENGER_AUTO:   [2, 7]       # three-wheelers; nearest COCO approximation
    VAN:              [2]

  # Zone importance weight per vehicle type (used in impact score)
  # Larger/slower vehicles block more carriageway
  vehicle_zone_weight:
    CAR: 1.0
    SCOOTER: 0.4
    MOTOR_CYCLE: 0.4
    MOPED: 0.3
    PASSENGER_AUTO: 0.8
    MAXI_CAB: 1.5
    LGV: 1.8
    HGV: 2.0
    PRIVATE_BUS: 2.0
    BUS: 2.0
    VAN: 1.2
    LORRY: 1.9
    TANKER: 2.0
    DEFAULT: 1.0

# ─── ByteTrack ────────────────────────────────────────────────────────────────
tracker:
  type: bytetrack
  track_thresh: 0.50
  track_buffer: 30             # frames to keep lost track alive
  match_thresh: 0.80
  min_box_area: 100

# ─── No-Parking Zone Detection ────────────────────────────────────────────────
parking:
  stationary_threshold_seconds: 60    # flag after vehicle stops for this long
  centroid_movement_px: 8             # pixel movement below this = stationary
  min_frames_stationary: 5            # min consecutive frames before starting timer
  junction_radius_meters: 50          # buffer around junction GPS coords

